[tool.ruff]
extend-exclude = ["venv", ".venv", "log", "__pycache__", "build", "dist"]
line-length = 150

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "PLR2044",
    "TRY003",
    "COM812",
    "D100",
    "D101",
    "D102",
    "D103",
    "D104",
    "D105",
    "D205",
    "D208",
    "D212",
    "D214",
    "D405",
    "D413",
    "FBT001",
    "FBT002",
    "EM101",
    "EM102",
    "E501",
    "ICN001",
    "N813",
    "T201",
    "TD002",
    "TD003",
    # "I101"   
]
fixable = ["ALL"]

[tool.ruff.format]
# You can still have it look like Black, but with your tweaks
quote-style = "double"
indent-style = "space"

[tool.ruff.lint.flake8-annotations]
allow-star-arg-any = true
ignore-fully-untyped = false
# suppress-none-returning = true
